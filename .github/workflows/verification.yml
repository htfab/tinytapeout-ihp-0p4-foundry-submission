name: Physical Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  precheck-drc:
    name: Precheck DRC
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read info.json
        id: info
        run: |
          echo "gds_path=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d['release']['gds'])")" >> "$GITHUB_OUTPUT"
          echo "top_cell=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d['top_cell_name'])")" >> "$GITHUB_OUTPUT"
          echo "pdk_version=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d['pdk_version'])")" >> "$GITHUB_OUTPUT"
          echo "pdk_repo=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d.get('pdk_repository', 'https://github.com/IHP-GmbH/IHP-Open-PDK'))")" >> "$GITHUB_OUTPUT"

      - name: Install KLayout
        run: |
          wget https://github.com/TinyTapeout/klayout/releases/download/v0.29.12/klayout_0.29.12-1_amd64.deb
          sudo apt-get update
          sudo apt-get install -y ./klayout_0.29.12-1_amd64.deb
          pip install klayout==0.29.12

      - name: Clone PDKs
        run: |
          git clone https://github.com/IHP-GmbH/IHP-Open-PDK.git ihp-sg13g2
          git clone "${{ steps.info.outputs.pdk_repo }}" PDK
          cd PDK && git checkout "${{ steps.info.outputs.pdk_version }}"

      - name: Run Precheck DRC
        shell: bash
        run: |
          set -eo pipefail
          python3 PDK/libs.tech/klayout/tech/drc/run_drc.py \
            --path="${{ steps.info.outputs.gds_path }}" \
            --topcell="${{ steps.info.outputs.top_cell }}" \
            --precheck_drc \
            --mp=4 \
            --no_offgrid \
            --no_angle \
            --disable_extra_rules \
            --no_recommended \
            2>&1 | tee precheck_drc.log

      - name: Upload precheck DRC results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: precheck-drc-results
          path: |
            precheck_drc*
            **/*.lyrdb

  full-drc:
    name: Full DRC
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read info.json
        id: info
        run: |
          echo "gds_path=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d['release']['gds'])")" >> "$GITHUB_OUTPUT"
          echo "top_cell=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d['top_cell_name'])")" >> "$GITHUB_OUTPUT"
          echo "pdk_version=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d['pdk_version'])")" >> "$GITHUB_OUTPUT"
          echo "pdk_repo=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d.get('pdk_repository', 'https://github.com/IHP-GmbH/IHP-Open-PDK'))")" >> "$GITHUB_OUTPUT"

      - name: Install KLayout
        run: |
          wget https://github.com/TinyTapeout/klayout/releases/download/v0.29.12/klayout_0.29.12-1_amd64.deb
          sudo apt-get update
          sudo apt-get install -y ./klayout_0.29.12-1_amd64.deb
          pip install klayout==0.29.12

      - name: Clone PDKs
        run: |
          git clone https://github.com/IHP-GmbH/IHP-Open-PDK.git ihp-sg13g2
          git clone "${{ steps.info.outputs.pdk_repo }}" PDK
          cd PDK && git checkout "${{ steps.info.outputs.pdk_version }}"

      - name: Run Full DRC
        shell: bash
        run: |
          set -eo pipefail
          python3 PDK/libs.tech/klayout/tech/drc/run_drc.py \
            --path="${{ steps.info.outputs.gds_path }}" \
            --topcell="${{ steps.info.outputs.top_cell }}" \
            --disable_extra_rules \
            --mp=4 \
            2>&1 | tee full_drc.log

      - name: Upload full DRC results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-drc-results
          path: |
            full_drc*
            **/*.lyrdb

  density-check:
    name: Metal Density Check
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read info.json
        id: info
        run: |
          echo "gds_path=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d['release']['gds'])")" >> "$GITHUB_OUTPUT"
          echo "top_cell=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d['top_cell_name'])")" >> "$GITHUB_OUTPUT"
          echo "pdk_version=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d['pdk_version'])")" >> "$GITHUB_OUTPUT"
          echo "pdk_repo=$(python3 -c "import json; d=json.load(open('doc/info.json')); print(d.get('pdk_repository', 'https://github.com/IHP-GmbH/IHP-Open-PDK'))")" >> "$GITHUB_OUTPUT"

      - name: Install KLayout
        run: |
          wget https://github.com/TinyTapeout/klayout/releases/download/v0.29.12/klayout_0.29.12-1_amd64.deb
          sudo apt-get update
          sudo apt-get install -y ./klayout_0.29.12-1_amd64.deb
          pip install klayout==0.29.12

      - name: Clone PDKs
        run: |
          git clone https://github.com/IHP-GmbH/IHP-Open-PDK.git ihp-sg13g2
          git clone "${{ steps.info.outputs.pdk_repo }}" PDK
          cd PDK && git checkout "${{ steps.info.outputs.pdk_version }}"

      - name: Run Metal Density Check
        shell: bash
        run: |
          set -eo pipefail
          python3 PDK/libs.tech/klayout/tech/drc/run_drc.py \
            --path="${{ steps.info.outputs.gds_path }}" \
            --topcell="${{ steps.info.outputs.top_cell }}" \
            --density_only \
            --density_thr=4 \
            --mp=4 \
            2>&1 | tee density_report.log

      - name: Upload density results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: density-results
          path: |
            density_report.*
            **/*.lyrdb
